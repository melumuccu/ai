[tasks.skills-json]
description = "SKILL.md のフロントマターから .agents/skills/skills.json を生成する"
run = '''
find .agents/skills -name 'SKILL.md' -print0 | sort -z | xargs -0 ruby -rjson -ryaml -e 'puts JSON.pretty_generate(ARGV.map { |path| text = File.read(path); fm = text[/\A---\s*\n(.*?)\n---\s*\n/m, 1] or next; data = YAML.safe_load(fm) || {}; { path: path.sub(%r{\A\./}, ""), name: data["name"], description: data["description"] } }.compact)' > .agents/skills/skills.json
'''
